name: Docker Build & Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.new_tag }},enable=${{ steps.tag.outputs.new_tag != '' }}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Greggorpages Next.js application
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Self-Update on Server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SELF_UPDATE_URL: ${{ secrets.SELF_UPDATE_URL }}
          API_KEY: ${{ secrets.GREGGORPAGES_API_KEY }}
          DEPLOY_PATH: ${{ secrets.SELF_UPDATE_DEPLOY_PATH }}
          MAINTENANCE_MODE: ${{ secrets.SELF_UPDATE_MAINTENANCE_MODE || 'false' }}
        run: |
          if [ -n "$SELF_UPDATE_URL" ] && [ -n "$API_KEY" ] && [ -n "$DEPLOY_PATH" ]; then
            echo "Triggering self-update at $SELF_UPDATE_URL with path $DEPLOY_PATH"
            curl -X POST "$SELF_UPDATE_URL" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: $API_KEY" \
              -H "X-Deploy-Path: $DEPLOY_PATH" \
              -H "X-Maintenance-Mode: $MAINTENANCE_MODE"
          else
            echo "Self-update not configured. Set SELF_UPDATE_URL, GREGGORPAGES_API_KEY and SELF_UPDATE_DEPLOY_PATH secrets to enable."
          fi
